{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Inicio de sesión</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>




<form method="POST">
    <h2>AgroTank</h2>
    {% csrf_token %}

    <label>Usuario:</label>
    <input type="text" name="username" required>

    <br><br>

    <label>Contraseña:</label>
    <input type="password" name="password" required>

    <br><br>

    <button type="submit">
        Iniciar sesión
    </button>

</form>

{% if messages %}
    {% for message in messages %}
        <p style="color:red;">
            {{ message }}
        </p>
    {% endfor %}
{% endif %}

</body>
</html>
